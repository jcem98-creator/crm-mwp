<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CRM | My Wedding Palace</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #d4af37; /* Gold */
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(212, 175, 55, 0.03), transparent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo-area h1 {
            font-size: 2rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--text-dim);
            font-weight: 300;
        }

        /* Tabs System */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            transition: 0.3s;
            border-radius: 8px;
        }

        .tab-btn.active {
            color: var(--accent);
            background: rgba(212, 175, 55, 0.1);
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card span {
            display: block;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-card strong {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .leads-card, .metrics-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2rem;
            padding: 2rem;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .chart-container h3 {
            margin-bottom: 1.5rem;
            font-weight: 400;
            color: var(--text-dim);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            color: white;
            outline: none;
            width: 300px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1.2rem 2rem;
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border: none;
        }

        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-nuevo { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .badge-interesado { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .badge-cita { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
        .badge-pago { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }

        .actions button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.4rem 0.7rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 0.3rem;
            font-size: 0.8rem;
        }

        .actions button:hover {
            border-color: var(--accent);
            color: white;
        }

        .refresh-btn {
            background: var(--accent) !important;
            color: black !important;
            font-weight: 600;
            padding: 0.6rem 1.2rem !important;
        }

        @media (max-width: 768px) {
            header, .table-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .search-box { width: 100%; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1>My Wedding Palace</h1>
                <p>MWP AI - Admin Panel</p>
            </div>
            <div class="actions">
                <button class="refresh-btn" onclick="fetchLeads()">Actualizar Todo</button>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" id="btn-leads" onclick="switchView('leads')">Lista de Leads</button>
            <button class="tab-btn" id="btn-metrics" onclick="switchView('metrics')">Métricas de Negocio</button>
        </nav>

        <!-- View: Leads -->
        <section id="view-leads" class="view-section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <span>Leads Activos</span>
                    <strong id="stat-total">0</strong>
                </div>
                <div class="stat-card">
                    <span>Interesados</span>
                    <strong id="stat-interesados">0</strong>
                </div>
                <div class="stat-card">
                    <span>Citas Agendadas</span>
                    <strong id="stat-citas">0</strong>
                </div>
                <div class="stat-card" style="border-color: var(--success);">
                    <span>Ventas Totales</span>
                    <strong id="stat-pagado" style="color: var(--success);">$0</strong>
                </div>
            </div>

            <div class="leads-card">
                <div class="table-header">
                    <h2>Gestión de Leads</h2>
                    <input type="text" class="search-box" placeholder="Buscar cliente..." oninput="filterTable(this.value)">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Cliente / Chat</th>
                            <th>Interés</th>
                            <th>Fecha Boda</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="leads-body">
                        <!-- Data here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- View: Metrics -->
        <section id="view-metrics" class="view-section">
            <div class="metrics-grid">
                <div class="chart-container">
                    <h3>Embudo Comercial (Funnel)</h3>
                    <canvas id="funnelChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Popularidad de Paquetes</h3>
                    <canvas id="packagesChart"></canvas>
                </div>
                <div class="chart-container" style="grid-column: span 2;">
                    <h3>Ventas Acumuladas</h3>
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </section>
    </div>

    <script>
        let charts = {};

        async function fetchLeads() {
            try {
                const res = await fetch('/api/leads');
                let leads = await res.json();
                const activeLeads = leads.filter(l => l.status !== 'descartado');
                renderLeads(activeLeads);
                updateStats(leads);
                renderMetrics(leads);
            } catch (err) {
                console.error("Error fetching leads:", err);
            }
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('btn-' + view).classList.add('active');
            
            if (view === 'metrics') {
                // Pequeño delay para que el canvas tenga tamaño correcto
                setTimeout(() => fetchLeads(), 100);
            }
        }

        function renderLeads(leads) {
            const body = document.getElementById('leads-body');
            body.innerHTML = '';
            
            leads.forEach(lead => {
                const tr = document.createElement('tr');
                const cleanPhone = lead.chat_id.split('@')[0];
                
                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 600; cursor: pointer; text-decoration: underline dotted;" onclick="editField('${lead.chat_id}', 'name', '${lead.name || ''}')">
                            ${lead.name || 'Sin Nombre'} ✏️
                        </div>
                        <div style="color: grey; font-size: 0.8rem;">${cleanPhone}</div>
                    </td>
                    <td>${lead.package_interest || '-'}</td>
                    <td>
                        <div style="cursor: pointer;" onclick="editField('${lead.chat_id}', 'date', '${lead.desired_date || ''}')">
                            ${lead.desired_date || '-'} ✏️
                        </div>
                    </td>
                    <td><span class="badge badge-${lead.status.toLowerCase()}">${lead.status.toUpperCase()} ${lead.paid_amount > 0 ? '($'+lead.paid_amount+')' : ''}</span></td>
                    <td class="actions">
                        <button onclick="updateStatus('${lead.chat_id}', 'interesado')">Interés</button>
                        <button onclick="updateStatus('${lead.chat_id}', 'cita')">Cita</button>
                        <button onclick="markAsPaid('${lead.chat_id}')" style="border-color: var(--success); color: var(--success);">Vendido</button>
                        <button onclick="updateStatus('${lead.chat_id}', 'descartado')" style="border-color: var(--danger); color: var(--danger);">Descartar</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function renderMetrics(leads) {
            // Destruir charts previos si existen para evitar basura visual
            if (charts.funnel) charts.funnel.destroy();
            if (charts.packages) charts.packages.destroy();
            if (charts.sales) charts.sales.destroy();

            // 1. DATA: Funnel
            const funnelTotals = {
                nuevo: leads.length,
                interesado: leads.filter(l => ['interesado', 'cita', 'pago'].includes(l.status)).length,
                cita: leads.filter(l => ['cita', 'pago'].includes(l.status)).length,
                pago: leads.filter(l => l.status === 'pago').length
            };

            const ctxFunnel = document.getElementById('funnelChart').getContext('2d');
            charts.funnel = new Chart(ctxFunnel, {
                type: 'bar',
                data: {
                    labels: ['Prospectos', 'Interesados', 'Citas', 'Ventas'],
                    datasets: [{
                        label: 'Clientes',
                        data: [funnelTotals.nuevo, funnelTotals.interesado, funnelTotals.cita, funnelTotals.pago],
                        backgroundColor: ['#fff', '#3498db', '#f1c40f', '#2ecc71']
                    }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            // 2. DATA: Packages
            // Mapear paquetes a nombres oficiales para el gráfico
            const packageCounts = {
                "Sencilla": 0,
                "Capilla": 0,
                "Domicilio": 0
            };
            leads.forEach(l => {
                if (!l.package_interest) return;
                const p = l.package_interest.toLowerCase();
                if (p.includes('sencilla') || p.includes('simple')) packageCounts["Sencilla"]++;
                else if (p.includes('capilla') || p.includes('elegante')) packageCounts["Capilla"]++;
                else if (p.includes('domicilio')) packageCounts["Domicilio"]++;
            });

            const ctxPack = document.getElementById('packagesChart').getContext('2d');
            charts.packages = new Chart(ctxPack, {
                type: 'doughnut',
                data: {
                    labels: ['Boda Sencilla/Simple', 'Boda en Capilla Elegante', 'Boda a Domicilio'],
                    datasets: [{
                        data: [packageCounts["Sencilla"], packageCounts["Capilla"], packageCounts["Domicilio"]],
                        backgroundColor: ['#a0a0a0', '#d4af37', '#8e44ad'],
                        borderWidth: 0
                    }]
                }
            });

            // 3. DATA: Sales Over Time
            // Mostramos los últimos 7 leads pagados como ejemplo cronológico
            const paidLeads = leads.filter(l => l.status === 'pago').slice(-10);
            const ctxSales = document.getElementById('salesChart').getContext('2d');
            charts.sales = new Chart(ctxSales, {
                type: 'line',
                data: {
                    labels: paidLeads.map(l => l.name || 'Venta'),
                    datasets: [{
                        label: 'Monto de Venta ($)',
                        data: paidLeads.map(l => l.paid_amount),
                        borderColor: '#2ecc71',
                        backgroundColor: 'rgba(46, 204, 113, 0.2)',
                        fill: true,
                        tension: 0.4
                    }]
                }
            });
        }

        async function editField(chatId, field, currentVal) {
            const label = field === 'name' ? 'Nombre del Cliente' : 'Fecha Deseada';
            const newVal = prompt(`Editar ${label}:`, currentVal);
            if (newVal !== null) {
                const body = { chatId };
                body[field] = newVal;
                await fetch('/api/leads/update-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                fetchLeads();
            }
        }

        async function markAsPaid(chatId) {
            const amount = prompt("¿Cuál fue el monto de la venta?", "500");
            if (amount !== null) {
                await fetch('/api/leads/update-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId, status: 'pago', amount: parseFloat(amount) })
                });
                fetchLeads();
            }
        }

        async function updateStatus(chatId, status) {
            await fetch('/api/leads/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatId, status })
            });
            fetchLeads();
        }

        function updateStats(leads) {
            const active = leads.filter(l => l.status !== 'descartado');
            document.getElementById('stat-total').innerText = active.length;
            document.getElementById('stat-interesados').innerText = leads.filter(l => l.status === 'interesado').length;
            document.getElementById('stat-citas').innerText = leads.filter(l => l.status === 'cita').length;
            
            const totalMoney = leads.reduce((sum, l) => sum + (l.paid_amount || 0), 0);
            document.getElementById('stat-pagado').innerText = '$' + totalMoney.toLocaleString();
        }

        function filterTable(query) {
            const rows = document.querySelectorAll('#leads-body tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
            });
        }

        // Initial fetch
        fetchLeads();
        // Auto refresh
        setInterval(fetchLeads, 60000);
    </script>
</body>
</html>
