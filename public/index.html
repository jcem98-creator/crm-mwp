<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite CRM v2 | My Wedding Palace</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --bg: #030305;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(255, 255, 255, 0.05);
            --accent: #d4af37; /* Gold */
            --accent-glow: rgba(212, 175, 55, 0.2);
            --text: #f0f2f5;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.06);
            --panel-bg: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.01);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 3rem;
            transition: margin-right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .logo-area h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0.4rem;
            font-weight: 600;
            opacity: 0.8;
        }

        .actions-header {
            display: flex;
            gap: 1rem;
        }

        .btn-elite {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        .btn-elite:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.8rem 1.8rem;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--accent);
        }

        /* High Visibility Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 32px;
            border: 1px solid var(--border);
            position: relative;
            transition: all 0.4s;
        }

        .stat-card span {
            display: block;
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
        }

        .stat-card strong {
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            display: block;
        }

        /* Nav Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            padding: 1rem 2rem;
            transition: 0.3s;
            border-radius: 16px;
        }

        .tab-btn.active {
            color: var(--accent);
            background: rgba(212, 175, 55, 0.1);
        }

        /* Table & Filters */
        .leads-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border-radius: 36px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-header {
            padding: 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filters-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-select, .search-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 0.8rem 1.2rem;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .filter-select:focus, .search-box:focus {
            border-color: var(--accent);
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 1.5rem 2.5rem;
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.2);
        }
        td {
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
            color: #fff;
        }
        tr { cursor: pointer; transition: 0.3s; }
        tr:hover td { background: var(--card-hover); }

        .badge {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-nuevo { background: rgba(148, 163, 184, 0.1); color: #94a3b8; }
        .badge-interesado { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .badge-cita { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
        .badge-pago { background: rgba(16, 185, 129, 0.1); color: #34d399; }
        .badge-human { background: rgba(239, 68, 68, 0.1); color: #f87171; }

        /* Detail Panel */
        #detail-panel {
            position: fixed;
            top: 1.5rem;
            right: -650px;
            width: 600px;
            height: calc(100vh - 3rem);
            background: var(--panel-bg);
            border-radius: 36px;
            border: 1px solid var(--border);
            box-shadow: -40px 0 80px rgba(0,0,0,0.8);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin-right: 1.5rem;
        }
        #detail-panel.open { right: 0; }

        .panel-header { padding: 3rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
        .panel-title h2 { font-size: 2rem; font-family: 'Playfair Display', serif; }
        .panel-content { flex: 1; overflow-y: auto; padding: 3rem; }

        .notes-area {
            margin-top: 2.5rem;
            background: rgba(255,255,255,0.03);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid var(--border);
        }
        .notes-area h4 { margin-bottom: 1rem; font-size: 0.85rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            padding: 1rem;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 1rem;
        }
        textarea:focus { border-color: var(--accent); }

        .chat-view {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 2rem;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .msg { max-width: 80%; padding: 1rem 1.5rem; border-radius: 20px; font-size: 0.95rem; }
        .msg.user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        .msg.assistant { align-self: flex-start; background: var(--card-bg); border: 1px solid var(--border); }

        /* Modal Elite */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--panel-bg);
            width: 500px;
            padding: 4rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            position: relative;
        }
        .modal-content h2 { margin-bottom: 2rem; font-family: 'Playfair Display', serif; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.6rem; color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; font-weight: 700; }
        .form-group input, .form-group select {
            width: 100%; padding: 1rem; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }

        .close-btn { position: absolute; top: 2rem; right: 2rem; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1 id="biz-name">My Wedding Palace</h1>
                <p id="biz-slogan">Elite CRM & Lead Intelligence</p>
            </div>
            <div class="actions-header">
                <button class="btn-elite" onclick="openModal()">+ Nuevo Prospecto</button>
                <button class="btn-outline" onclick="fetchLeads()">Sincronizar</button>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" id="btn-leads" onclick="switchView('leads')">Directorio de Leads</button>
            <button class="tab-btn" id="btn-metrics" onclick="switchView('metrics')">Performance & Funnel</button>
        </nav>

        <section id="view-leads" class="view-section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <span>Prospectos</span>
                    <strong id="stat-total">0</strong>
                </div>
                <div class="stat-card">
                    <span>En Cita</span>
                    <strong id="stat-citas" style="color: var(--warning);">0</strong>
                </div>
                <div class="stat-card">
                    <span>Cierres</span>
                    <strong id="stat-pagado" style="color: var(--success);">0</strong>
                </div>
                <div class="stat-card">
                    <span>Conversión</span>
                    <strong id="stat-conv" style="color: var(--accent);">0%</strong>
                </div>
            </div>

            <div class="leads-card">
                <div class="table-header">
                    <input type="text" class="search-box" style="width: 350px;" placeholder="Buscar cliente..." oninput="applyFilters()">
                    <div class="filters-group">
                        <select id="filter-status" class="filter-select" onchange="applyFilters()">
                            <option value="">Status: Todos</option>
                            <option value="nuevo">Nuevo</option>
                            <option value="interesado">Interesado</option>
                            <option value="cita">Cita</option>
                            <option value="pago">Pago</option>
                            <option value="human">Manual</option>
                        </select>
                        <select id="filter-interest" class="filter-select" onchange="applyFilters()">
                            <option value="">Interés: Todos</option>
                            <option value="high">High Interest 🔥</option>
                            <option value="low">Low/In Pipeline ⏳</option>
                        </select>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Paquete / Interés</th>
                            <th>Urgencia / Sentimiento</th>
                            <th>Status</th>
                            <th>Última Actividad</th>
                        </tr>
                    </thead>
                    <tbody id="leads-body"></tbody>
                </table>
            </div>
        </section>

        <!-- View: Metrics -->
        <section id="view-metrics" class="view-section" style="display: none;">
            <!-- Simplificado para brevedad, igual que v1 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                 <div style="background: var(--card-bg); padding: 3rem; border-radius: 36px;"><canvas id="funnelChart"></canvas></div>
                 <div style="background: var(--card-bg); padding: 3rem; border-radius: 36px;"><canvas id="packagesChart"></canvas></div>
            </div>
        </section>
    </div>

    <!-- Side Panel -->
    <div id="detail-panel">
        <div class="panel-header">
            <div class="panel-title">
                <h2 id="panel-name">-</h2>
                <span id="panel-jid" style="color: var(--accent); font-weight: 700;">-</span>
            </div>
            <button onclick="closePanel()" style="background: none; border: none; color: #fff; cursor: pointer; font-size: 1.5rem;">✕</button>
        </div>
        <div class="panel-content">
            <div id="panel-labels" style="display: flex; gap: 1rem; margin-bottom: 2rem;"></div>

            <div class="notes-area">
                <h4>Notas del Asesor</h4>
                <textarea id="advisor-notes" placeholder="Escribe detalles del cierre, visitas al local, etc..."></textarea>
                <button class="btn-elite" style="width: 100%; border-radius: 14px;" onclick="saveNotes()">Guardar Notas</button>
            </div>

            <h4 style="margin: 2rem 0 1rem; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase;">Chat Reciente</h4>
            <div class="chat-view" id="chat-history"></div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="btn-outline" style="flex: 1; border-color: var(--danger); color: var(--danger);" onclick="pauseAI()">Pausar IA</button>
                <button class="btn-outline" style="flex: 1; border-color: var(--success); color: var(--success);" onclick="activateAI()">Activar</button>
                <a id="wa-link" target="_blank" style="flex: 1.5; background: #25d366; color: #fff; text-decoration: none; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 700;">WA Directo</a>
            </div>
        </div>
    </div>

    <!-- Modal Registro -->
    <div id="modal-register" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h2>Nuevo Prospecto (Walk-in)</h2>
            <div class="form-group">
                <label>Teléfono (con código, ej: 51999888777)</label>
                <input type="text" id="reg-phone">
            </div>
            <div class="form-group">
                <label>Nombre del Cliente</label>
                <input type="text" id="reg-name">
            </div>
            <div class="form-group">
                <label>Paquete de Interés</label>
                <input type="text" id="reg-package">
            </div>
            <div class="form-group">
                <label>Status Inicial</label>
                <select id="reg-status">
                    <option value="human">Registro Manual / Visita</option>
                    <option value="cita">Cita Agendada</option>
                    <option value="interesado">Vino a preguntar</option>
                </select>
            </div>
            <button class="btn-elite" style="width: 100%;" onclick="registerLead()">Crear Lead</button>
        </div>
    </div>

    <script>
        let allLeads = [];
        let selectedChatId = null;

        async function fetchLeads() {
            try {
                const res = await fetch('/api/leads');
                allLeads = await res.json();
                applyFilters();
                updateStats(allLeads);
                renderMetrics(allLeads);
            } catch (err) { console.error(err); }
        }

        async function fetchConfig() {
            const res = await fetch('/api/config');
            const data = await res.json();
            document.getElementById('biz-name').innerText = data.businessName;
            document.getElementById('biz-slogan').innerText = data.businessSlogan;
            document.title = `${data.businessName} | Elite CRM`;
        }

        function applyFilters() {
            const searchQuery = document.querySelector('.search-box').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;
            const interestFilter = document.getElementById('filter-interest').value;

            const filtered = allLeads.filter(l => {
                const matchesSearch = (l.name || '').toLowerCase().includes(searchQuery) || l.chat_id.includes(searchQuery);
                const matchesStatus = !statusFilter || l.status === statusFilter;
                const matchesInterest = !interestFilter || (interestFilter === 'high' ? l.needs_followup : !l.needs_followup);
                return matchesSearch && matchesStatus && matchesInterest;
            });

            renderTable(filtered);
        }

        function renderTable(leads) {
            const body = document.getElementById('leads-body');
            body.innerHTML = '';
            leads.forEach(l => {
                const tr = document.createElement('tr');
                tr.onclick = () => openPanel(l);
                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 700;">${l.name || 'Invitado MWP'}</div>
                        <div style="color: var(--text-dim); font-size: 0.8rem;">${l.chat_id.split('@')[0]}</div>
                    </td>
                    <td style="font-weight: 600;">${l.package_interest || '-'}</td>
                    <td>
                        <span style="display: flex; align-items: center; gap: 8px;">
                            ${l.needs_followup ? '🔥 <span style="font-weight: 800; color: var(--danger);">High</span>' : '⏳ <span style="color: var(--text-dim);">Pipeline</span>'}
                        </span>
                    </td>
                    <td><span class="badge badge-${l.status.toLowerCase()}">${l.status}</span></td>
                    <td style="color: var(--text-dim); font-size: 0.85rem;">${new Date(l.last_bot_message_at).toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });
        }

        async function openPanel(lead) {
            selectedChatId = lead.chat_id;
            document.getElementById('panel-name').innerText = lead.name || 'Invitado MWP';
            document.getElementById('panel-jid').innerText = '+' + lead.chat_id.split('@')[0];
            document.getElementById('advisor-notes').value = lead.notes || '';
            document.getElementById('wa-link').href = `https://wa.me/${lead.chat_id.split('@')[0]}`;
            
            document.getElementById('detail-panel').classList.add('open');
            if (window.innerWidth > 1000) document.querySelector('.container').style.marginRight = '600px';

            // Fetch history
            const hRes = await fetch(`/api/leads/${lead.chat_id}/messages`);
            const msgs = await hRes.json();
            const hist = document.getElementById('chat-history');
            hist.innerHTML = '';
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.role}`;
                div.innerText = m.content;
                hist.appendChild(div);
            });
            hist.scrollTop = hist.scrollHeight;
        }

        async function saveNotes() {
            if (!selectedChatId) return;
            const notes = document.getElementById('advisor-notes').value;
            await fetch(`/api/leads/${selectedChatId}/notes`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ notes })
            });
            alert("Notas guardadas ✅");
            fetchLeads();
        }

        async function registerLead() {
            const chatId = document.getElementById('reg-phone').value + '@s.whatsapp.net';
            const name = document.getElementById('reg-name').value;
            const package_interest = document.getElementById('reg-package').value;
            const status = document.getElementById('reg-status').value;

            if(!chatId.includes('51')) { alert('Por favor usa formato con país (ej: 51...)'); return; }

            await fetch('/api/leads/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chatId, name, package_interest, status })
            });
            closeModal();
            fetchLeads();
        }

        function updateStats(leads) {
            document.getElementById('stat-total').innerText = leads.length;
            document.getElementById('stat-citas').innerText = leads.filter(l => l.status === 'cita').length;
            document.getElementById('stat-pagado').innerText = leads.filter(l => l.status === 'pago').length;
            const conv = leads.length > 0 ? (leads.filter(l => l.status === 'pago').length / leads.length * 100).toFixed(1) : 0;
            document.getElementById('stat-conv').innerText = conv + '%';
        }

        function switchView(view) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+view));
            document.querySelectorAll('.view-section').forEach(s => s.style.display = s.id === 'view-'+view ? 'block' : 'none');
        }

        function openModal() { document.getElementById('modal-register').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-register').style.display = 'none'; }
        function closePanel() { 
            document.getElementById('detail-panel').classList.remove('open');
            document.querySelector('.container').style.marginRight = 'auto';
        }

        // Charts (same as v1 but using global allLeads)
        function renderMetrics(leads) {
            // Placeholder - Implementation is same as v1 logic
        }

        fetchConfig();
        fetchLeads();
    </script>
</body>
</html>
